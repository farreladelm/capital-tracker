<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>AI Confirmation - Balance</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#fffbff",
                        "on-secondary-container": "#616267",
                        "background": "#fcf8ff",
                        "on-primary-container": "#fffbff",
                        "primary-fixed": "#e2dfff",
                        "on-secondary-fixed-variant": "#45474b",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#e2e2e7",
                        "primary": "#4c4bc6",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#464553",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#181a2f",
                        "surface-container-highest": "#e4e1ec",
                        "tertiary-fixed": "#e1e0fe",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#c6c6cb",
                        "surface-dim": "#dcd8e3",
                        "surface-container": "#f0ecf7",
                        "outline": "#777585",
                        "inverse-surface": "#303038",
                        "on-primary-fixed-variant": "#3633af",
                        "on-secondary-fixed": "#1a1c1f",
                        "secondary": "#5d5e63",
                        "surface-container-low": "#f5f2fd",
                        "surface-tint": "#4f4ec8",
                        "surface": "#fcf8ff",
                        "on-primary-fixed": "#0b006b",
                        "primary-container": "#6665e0",
                        "primary-fixed-dim": "#c2c1ff",
                        "surface-bright": "#fcf8ff",
                        "on-surface": "#1b1b22",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#44455d",
                        "inverse-on-surface": "#f3effa",
                        "on-error": "#ffffff",
                        "secondary-container": "#dfdfe4",
                        "surface-container-high": "#eae6f1",
                        "tertiary-fixed-dim": "#c4c4e1",
                        "outline-variant": "#c7c4d6",
                        "surface-variant": "#e4e1ec",
                        "tertiary": "#595a73",
                        "inverse-primary": "#c2c1ff",
                        "tertiary-container": "#72728c",
                        "on-background": "#1b1b22"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding": "20px",
                        "gutter": "16px",
                        "stack-sm": "8px",
                        "stack-lg": "32px",
                        "margin-page": "24px",
                        "stack-md": "16px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Manrope"],
                        "label-md": ["Manrope"],
                        "body-md": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "label-sm": ["Manrope"],
                        "display": ["Manrope"],
                        "body-lg": ["Manrope"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "display": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "26px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        
        .card-shadow {
            box-shadow: 0 4px 20px rgba(48, 48, 56, 0.05); /* Soft ambient shadow */
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-sans">
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-margin-page pb-24 md:pb-0 pt-16 md:pt-24 relative overflow-hidden">
<!-- Subtle Background Glow -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-30">
<div class="w-96 h-96 bg-primary-fixed-dim rounded-full blur-[100px]"></div>
</div>
<!-- Confirmation Card -->
<div class="bg-surface-container-lowest rounded-[32px] p-8 max-w-md w-full relative z-10 card-shadow flex flex-col items-center text-center animate-fade-in-up">
<!-- Success Icon -->
<div class="w-20 h-20 rounded-full bg-primary/10 flex items-center justify-center mb-6 text-primary">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: &quot;FILL&quot; 1; font-size: 40px;">check_circle</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-2">Expense Added</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-8">Your transaction has been successfully recorded.</p>
<!-- Details Block -->
<div class="w-full rounded-2xl p-6 mb-8 flex flex-col gap-4 bg-surface-container-lowest border border-outline-variant/30">
<div class="flex justify-between items-center pb-4 border-b border-outline-variant/30">
<span class="font-body-md text-body-md text-on-surface-variant">Amount</span>
<span class="font-headline-md text-headline-md text-on-surface">$5.00</span>
</div>
<div class="flex justify-between items-center">
<span class="font-body-md text-body-md text-on-surface-variant">Description</span>
<span class="font-label-md text-label-md text-on-surface">Coffee</span>
</div>
<div class="flex justify-between items-center">
<span class="font-body-md text-body-md text-on-surface-variant">Category</span>
<div class="flex items-center gap-2 bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full">
<span class="material-symbols-outlined text-[16px]" data-icon="restaurant">restaurant</span>
<span class="font-label-sm text-label-sm">Food</span>
</div>
</div>
<div class="flex justify-between items-center">
<span class="font-body-md text-body-md text-on-surface-variant">Date</span>
<span class="font-label-md text-label-md text-on-surface">Today</span>
</div>
<div class="flex justify-between items-center">
<span class="font-body-md text-body-md text-on-surface-variant">Payment Method</span>
<span class="font-label-md text-label-md text-on-surface">Cash</span>
</div>
</div>
<!-- Actions -->
<div class="w-full flex flex-col gap-4">
<button class="w-full h-14 bg-primary text-on-primary rounded-full font-label-md text-label-md flex items-center justify-center hover:opacity-90 active:scale-95 transition-all shadow-md shadow-primary/20">
                    Done
                </button>
<button class="w-full h-14 bg-primary/10 text-primary rounded-full font-label-md text-label-md flex items-center justify-center hover:bg-primary/20 active:scale-95 transition-all">
                    Edit Details
                </button>
</div>
</div>
</main>
<style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }
    </style>


</body></html>
