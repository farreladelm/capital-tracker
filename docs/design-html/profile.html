<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-background/80 dark:bg-background/80 backdrop-blur-xl fixed top-0 w-full z-50 bg-transparent flex justify-between items-center px-margin-page h-16 w-full">

</button>
<h1 class="font-headline-md text-headline-md text-primary dark:text-primary-fixed font-headline-md text-headline-md font-bold">Balance</h1>
<button class="active:scale-95 transition-transform hover:opacity-80 transition-opacity flex items-center justify-center">

</button>

<main class="pt-24 px-margin-page md:max-w-2xl md:mx-auto pb-stack-lg">
<!-- Profile Header -->
<section class="flex flex-col items-center mb-stack-lg text-center pt-stack-md">

<img class="w-full h-full object-cover" data-alt="A clean, minimalist portrait of a professional individual (Alex) set against a soft, bright background. The lighting is diffused and modern, fitting a premium finance app aesthetic. The mood is calm, trustworthy, and approachable, perfectly aligning with a high-end corporate identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAGiZnx9iFYP9WCdR-JbWIBL4QPYi2yVdy8DxEPHYbbOgu5Uxe4VA8wOcurPLPaJQiOm-jsncF42I8NZx5PMEriWGvbhOc1TsQKjH3KhCYAPDEfUwssqcMF9e20nxeoK_E0SgFSJjVyqYEmHPKVIUvxxOfRBeBRcyeLsqrunSita7TgUg1t0lpMTN3cl5irtSeiCtVr0U46H6vifEf2MWID52ug-JiudBAzpHVGgMmWtIEpY4IqzeeqRVKw5-yPdjHLbl6rVinVT28">
</div>

<p class="font-body-md text-body-md text-secondary">alex@aurafinance.com</p>
</section>

<div class="flex items-center gap-gutter">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">account_balance</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface">Accounts</span>
</div>
<span class="material-symbols-outlined text-secondary opacity-50">chevron_right</span>
</button>
<div class="h-px bg-outline-variant/30 ml-16 mr-2"></div>
<!-- Budget Settings -->
<button class="flex items-center justify-between py-stack-md active:scale-95 transition-transform hover:bg-primary/5 rounded-lg px-2 group">
<div class="flex items-center gap-gutter">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">pie_chart</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface">Budget Settings</span>
</div>
<span class="material-symbols-outlined text-secondary opacity-50">chevron_right</span>
</button>

</div>

<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">security</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface">Security</span>
</div>
<span class="material-symbols-outlined text-secondary opacity-50">chevron_right</span>

<div class="h-px bg-outline-variant/30 ml-16 mr-2"></div>

<span class="material-symbols-outlined">help</span>
</div>

</button>

<!-- Home -->
