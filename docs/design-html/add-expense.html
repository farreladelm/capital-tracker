<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Balance - Add Expense</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-container": "#fffbff",
                    "on-secondary-container": "#616267",
                    "background": "#fcf8ff",
                    "on-primary-container": "#fffbff",
                    "primary-fixed": "#e2dfff",
                    "on-secondary-fixed-variant": "#45474b",
                    "error-container": "#ffdad6",
                    "secondary-fixed": "#e2e2e7",
                    "primary": "#4c4bc6",
                    "on-tertiary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "error": "#ba1a1a",
                    "on-surface-variant": "#464553",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed": "#181a2f",
                    "surface-container-highest": "#e4e1ec",
                    "tertiary-fixed": "#e1e0fe",
                    "on-primary": "#ffffff",
                    "secondary-fixed-dim": "#c6c6cb",
                    "surface-dim": "#dcd8e3",
                    "surface-container": "#f0ecf7",
                    "outline": "#777585",
                    "inverse-surface": "#303038",
                    "on-primary-fixed-variant": "#3633af",
                    "on-secondary-fixed": "#1a1c1f",
                    "secondary": "#5d5e63",
                    "surface-container-low": "#f5f2fd",
                    "surface-tint": "#4f4ec8",
                    "surface": "#fcf8ff",
                    "on-primary-fixed": "#0b006b",
                    "primary-container": "#6665e0",
                    "primary-fixed-dim": "#c2c1ff",
                    "surface-bright": "#fcf8ff",
                    "on-surface": "#1b1b22",
                    "on-error-container": "#93000a",
                    "on-tertiary-fixed-variant": "#44455d",
                    "inverse-on-surface": "#f3effa",
                    "on-error": "#ffffff",
                    "secondary-container": "#dfdfe4",
                    "surface-container-high": "#eae6f1",
                    "tertiary-fixed-dim": "#c4c4e1",
                    "outline-variant": "#c7c4d6",
                    "surface-variant": "#e4e1ec",
                    "tertiary": "#595a73",
                    "inverse-primary": "#c2c1ff",
                    "tertiary-container": "#72728c",
                    "on-background": "#1b1b22"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "container-padding": "20px",
                    "gutter": "16px",
                    "stack-sm": "8px",
                    "stack-lg": "32px",
                    "margin-page": "24px",
                    "stack-md": "16px"
            },
            "fontFamily": {
                    "headline-lg": ["Manrope"],
                    "label-md": ["Manrope"],
                    "body-md": ["Manrope"],
                    "headline-lg-mobile": ["Manrope"],
                    "headline-md": ["Manrope"],
                    "label-sm": ["Manrope"],
                    "display": ["Manrope"],
                    "body-lg": ["Manrope"]
            },
            "fontSize": {
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "display": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}]
            }
          }
        }
      }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 4px 20px rgba(76, 75, 198, 0.04);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col relative overflow-hidden">
<!-- Top Navigation -->
<header class="fixed top-0 w-full bg-background/80 dark:bg-background/80 backdrop-blur-xl bg-transparent z-50 flex justify-between items-center px-margin-page h-16 w-full z-50">
<button class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 transition-transform" data-icon="close">
<span class="material-symbols-outlined text-2xl font-light">close</span>
</button>
<span class="font-headline-md text-headline-md font-bold text-primary">Balance</span>
<div class="w-10 h-10"></div> <!-- Spacer -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col pt-24 pb-32 px-margin-page overflow-y-auto">
<!-- Suggestions Area -->
<div class="mt-auto mb-stack-lg w-full max-w-md mx-auto">
<h2 class="font-label-md text-label-md text-secondary mb-stack-sm pl-2">Quick Suggestions</h2>
<div class="flex overflow-x-auto hide-scrollbar space-x-gutter pb-2 -mx-margin-page px-margin-page md:mx-0 md:px-0">
<button class="flex-shrink-0 flex items-center space-x-2 bg-surface-container-high text-on-surface px-4 py-2 rounded-full hover:opacity-80 active:scale-95 transition-all">
<span class="material-symbols-outlined text-[18px]">restaurant</span>
<span class="font-body-md text-body-md">Lunch $15</span>
</button>
<button class="flex-shrink-0 flex items-center space-x-2 bg-surface-container-high text-on-surface px-4 py-2 rounded-full hover:opacity-80 active:scale-95 transition-all">
<span class="material-symbols-outlined text-[18px]">local_taxi</span>
<span class="font-body-md text-body-md">Grab $8</span>
</button>
<button class="flex-shrink-0 flex items-center space-x-2 bg-surface-container-high text-on-surface px-4 py-2 rounded-full hover:opacity-80 active:scale-95 transition-all">
<span class="material-symbols-outlined text-[18px]">movie</span>
<span class="font-body-md text-body-md">Netflix $12</span>
</button>
</div>
</div>
<!-- Input Area -->
<div class="w-full max-w-md mx-auto relative glass-card rounded-3xl p-4 md:p-6 mb-8 shadow-[0_-4px_20px_rgba(76,75,198,0.06)]">
<textarea autofocus="" class="w-full bg-transparent border-none outline-none font-headline-md text-headline-md resize-none placeholder-secondary-fixed-dim text-on-surface min-h-[120px] focus:ring-0 p-0" placeholder="What did you spend today?"></textarea>
<div class="flex justify-between items-center mt-stack-sm">
<div class="flex space-x-4">
<button aria-label="Voice input" class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface hover:opacity-80 active:scale-95 transition-all">
<span class="material-symbols-outlined text-2xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
<button aria-label="Camera input" class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface hover:opacity-80 active:scale-95 transition-all">
<span class="material-symbols-outlined text-2xl">photo_camera</span>
</button>
</div>
<button class="h-12 px-6 flex items-center justify-center rounded-full bg-primary text-on-primary font-label-md text-label-md shadow-lg hover:opacity-90 active:scale-95 transition-all">
<span>Save</span>
<span class="material-symbols-outlined ml-2 text-xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</div>
</main>
<!-- Bottom Navigation Shell intentionally suppressed for transactional view -->
<script>
        // Auto-resize textarea
        const tx = document.getElementsByTagName("textarea");
        for (let i = 0; i < tx.length; i++) {
          tx[i].setAttribute("style", "height:" + (tx[i].scrollHeight) + "px;overflow-y:hidden;");
          tx[i].addEventListener("input", OnInput, false);
        }

        function OnInput() {
          this.style.height = 'auto';
          this.style.height = (this.scrollHeight) + "px";
        }
    </script>
</body></html>
